<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Songs — Sage Sedivec</title>
  <meta name="description" content="Original songs and covers by Sage Sedivec — singer-songwriter living on a sailboat in the Caribbean.">
  <meta property="og:title" content="Songs by Sage">
  <meta property="og:description" content="Original music and covers by Sage Sedivec.">
  <meta property="og:image" content="https://www.sailingwithsage.com/assets/images/sage/sage-beach-guitar.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Londrina+Shadow&family=Rubik:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">

  <style>
    /* ── Songs page ── */
    .songs-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 48px 80px;
    }

    /* ── Section header ── */
    .songs-section { margin-bottom: 64px; }

    .songs-section-head {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .songs-section-title {
      font-family: 'Londrina Shadow', cursive;
      font-size: 36px;
      color: var(--dark);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .songs-section-sub {
      font-family: 'Rubik', sans-serif;
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      margin-top: 2px;
    }

    .songs-section-line {
      flex: 1;
      height: 2px;
      background: var(--pink-light);
      border-radius: 2px;
    }

    /* ── Card grid ── */
    .songs-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    /* ── Song card ── */
    .song-card {
      display: block;
      background: #fff;
      border: 1.5px solid var(--pink-light);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      opacity: 0;
      transform: translateY(14px);
    }

    .song-card.in {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.45s ease, transform 0.45s ease, box-shadow 0.2s, border-color 0.2s;
    }

    .song-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(255,105,180,0.2);
      border-color: var(--pink);
    }

    /* Thumbnail */
    .song-thumb {
      position: relative;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      background: var(--pink-pale);
    }

    .song-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      transition: transform 0.35s ease;
    }

    .song-card:hover .song-thumb img { transform: scale(1.04); }

    /* Play overlay */
    .song-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,105,180,0.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .song-card:hover .song-overlay { opacity: 1; }

    .play-ring {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-ring svg {
      width: 22px;
      height: 22px;
      fill: var(--pink);
      margin-left: 3px;
    }

    .overlay-label {
      font-family: 'Rubik', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      background: rgba(0,0,0,0.25);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    /* Card info — minimal, title is in the thumbnail image */
    .song-info {
      padding: 10px 14px 12px;
    }

    .song-date {
      font-family: 'Rubik', sans-serif;
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .meta-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--pink-light);
      flex-shrink: 0;
    }

    /* ── Skeleton loading ── */
    .skel {
      background: #fff;
      border: 1.5px solid var(--pink-light);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .skel-img {
      aspect-ratio: 1 / 1;
      background: linear-gradient(90deg, var(--pink-pale) 25%, #ffe6f3 50%, var(--pink-pale) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    .skel-info { padding: 14px 16px; }

    .skel-line {
      height: 12px;
      background: linear-gradient(90deg, var(--pink-pale) 25%, #ffe6f3 50%, var(--pink-pale) 75%);
      background-size: 200% 100%;
      border-radius: 6px;
      margin-bottom: 8px;
      animation: shimmer 1.4s infinite;
    }

    .skel-line.short { width: 55%; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Empty state ── */
    .songs-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 56px 24px;
      color: var(--muted);
      font-family: 'Rubik', sans-serif;
      font-size: 15px;
    }

    .songs-empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    /* ── Last updated ── */
    .songs-updated {
      text-align: center;
      font-family: 'Rubik', sans-serif;
      font-size: 12px;
      color: var(--muted);
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1.5px solid var(--pink-light);
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .songs-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 820px) {
      .songs-wrap { padding: 40px 24px 64px; }
      .songs-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .songs-section-title { font-size: 28px; }
    }

    @media (max-width: 480px) {
      .songs-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <!-- HERO -->
  <section class="hero-sm">
    <h1 class="hero-name">Songs</h1>
    <p class="hero-tagline">Every song has a story — here are mine</p>
  </section>

  <div class="songs-wrap">

    <!-- ── ORIGINALS ── -->
    <section class="songs-section">
      <div class="songs-section-head">
        <div>
          <div class="songs-section-title">Original Songs</div>
          <div class="songs-section-sub">Written &amp; performed by Sage</div>
        </div>
        <div class="songs-section-line"></div>
      </div>
      <div class="songs-grid" id="grid-originals">
        <!-- Skeleton -->
        <div class="skel"><div class="skel-img"></div><div class="skel-info"><div class="skel-line"></div><div class="skel-line short"></div></div></div>
        <div class="skel"><div class="skel-img"></div><div class="skel-info"><div class="skel-line"></div><div class="skel-line short"></div></div></div>
        <div class="skel"><div class="skel-img"></div><div class="skel-info"><div class="skel-line"></div><div class="skel-line short"></div></div></div>
      </div>
    </section>

    <!-- ── COVERS ── -->
    <section class="songs-section">
      <div class="songs-section-head">
        <div>
          <div class="songs-section-title">Cover Songs</div>
          <div class="songs-section-sub">Sage's favorite songs to play</div>
        </div>
        <div class="songs-section-line"></div>
      </div>
      <div class="songs-grid" id="grid-covers">
        <div class="skel"><div class="skel-img"></div><div class="skel-info"><div class="skel-line"></div><div class="skel-line short"></div></div></div>
      </div>
    </section>

    <p class="songs-updated" id="songs-updated"></p>

  </div><!-- /songs-wrap -->

  <div id="footer-placeholder"></div>
  <script src="/assets/js/nav.js"></script>

  <script>
    /* ── Helpers ── */
    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    }

    function extractTitle(caption) {
      if (!caption) return 'Song';
      const line    = caption.split('\n')[0].trim();
      const cleaned = line.replace(/^[\u{1F300}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}♩♪♫♬✨🎵🎶🎸🎤\s]+/u, '').trim();
      const result  = cleaned.split('#')[0].trim() || 'Song';
      return result.length > 48 ? result.slice(0, 46) + '…' : result;
    }

    function isCover(post) {
      return post.type === 'cover';
    }

    function isIncluded(post) {
      return post.type === 'original' || post.type === 'cover';
    }

    function buildCard(post, idx) {
      const a = document.createElement('a');
      a.className = 'song-card';
      a.href      = post.permalink;
      a.target    = '_blank';
      a.rel       = 'noopener noreferrer';
      a.style.transitionDelay = (idx * 0.06) + 's';
      a.setAttribute('aria-label', 'Watch on Instagram');

      const img = post.thumbnail || post.media_url || '';
      a.innerHTML = `
        <div class="song-thumb">
          <img src="${img}" alt="Song by Sage" loading="lazy">
          <div class="song-overlay">
            <div class="play-ring">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <span class="overlay-label">Watch on Instagram</span>
          </div>
        </div>`;
      return a;
    }

    /* ── Load feed ── */
    async function loadFeed() {
      const gridOriginals = document.getElementById('grid-originals');
      const gridCovers    = document.getElementById('grid-covers');

      try {
        const res   = await fetch('posts.json?' + Date.now());
        if (!res.ok) throw new Error('Failed to load posts');
        const posts = await res.json();

        const originals = posts.filter(p => p.type === 'original');
        const covers    = posts.filter(p => p.type === 'cover');

        /* Render originals */
        gridOriginals.innerHTML = '';
        if (originals.length) {
          originals.forEach((p, i) => gridOriginals.appendChild(buildCard(p, i)));
        } else {
          gridOriginals.innerHTML = `
            <div class="songs-empty">
              <div class="songs-empty-icon">🎵</div>
              <p>Songs coming soon…</p>
            </div>`;
        }

        /* Render covers */
        gridCovers.innerHTML = '';
        if (covers.length) {
          covers.forEach((p, i) => gridCovers.appendChild(buildCard(p, i)));
        } else {
          gridCovers.innerHTML = `
            <div class="songs-empty">
              <div class="songs-empty-icon">🎸</div>
              <p>Covers coming soon…</p>
            </div>`;
        }

        /* Animate cards in */
        requestAnimationFrame(() =>
          document.querySelectorAll('.song-card').forEach(c => c.classList.add('in')));

        /* Last updated */
        const updated = posts.find(p => p.fetched_at)?.fetched_at;
        if (updated) {
          document.getElementById('songs-updated').textContent =
            'Last updated ' + new Date(updated).toLocaleDateString('en-US',
              { month: 'long', day: 'numeric', year: 'numeric' });
        }

      } catch (err) {
        gridOriginals.innerHTML = `
          <div class="songs-empty">
            <div class="songs-empty-icon">🎵</div>
            <p>Songs coming soon…</p>
          </div>`;
        gridCovers.innerHTML = '';
      }
    }

    /* ── Scroll reveal for section headers ── */
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.style.opacity = '1';
          e.target.style.transform = 'translateY(0)';
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.songs-section-head').forEach(el => {
      el.style.opacity = '0';
      el.style.transform = 'translateY(10px)';
      el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      observer.observe(el);
    });

    loadFeed();
  </script>

</body>
</html>
