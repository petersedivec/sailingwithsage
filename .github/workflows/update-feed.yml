name: Update Instagram Feed

on:
  schedule:
    # Daily at 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:   # allow manual trigger

permissions:
  contents: write    # commit posts.json + images

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Instagram posts
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: python scripts/fetch_posts.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add music/songs/posts.json music/songs/images/
          git diff --cached --quiet || git commit -m "chore: update Instagram feed [skip ci]"
          git push