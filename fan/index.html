<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sage Sedivec</title>
  <meta name="description" content="Sage Sedivec — Singer-Songwriter, Author & Boat Kid">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Londrina+Shadow&family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --pink:#FF69B4; --pink-dark:#e0559e;
      --off-white:rgb(255,255,242);
    }
    html,body { height:100%; background:var(--pink); font-family:"Rubik",sans-serif; overflow-x:hidden; }
    .fan-page {
      min-height:100dvh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:24px 20px; gap:0;
    }
    .fan-photo {
      width:96px; height:96px; border-radius:50%; overflow:hidden;
      border:3px solid rgba(255,255,255,0.6);
      box-shadow:0 4px 20px rgba(0,0,0,0.15); margin-bottom:12px; flex-shrink:0;
    }
    .fan-photo img { width:100%; height:100%; object-fit:cover; object-position:top; }
    .fan-name {
      font-family:"Londrina Shadow",cursive; font-size:38px;
      color:var(--off-white); letter-spacing:1px; line-height:1;
      margin-bottom:4px; text-align:center;
    }
    .fan-tagline {
      font-size:13px; color:rgba(255,255,255,0.85); font-weight:300;
      text-align:center; margin-bottom:24px; letter-spacing:0.3px;
    }
    .fan-links { display:flex; flex-direction:column; gap:11px; width:100%; max-width:320px; }
    .fan-btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      padding:15px 20px; border-radius:50px;
      font-family:"Rubik",sans-serif; font-size:15px; font-weight:500;
      text-decoration:none; transition:transform 0.15s,opacity 0.15s; letter-spacing:0.2px;
    }
    .fan-btn:active { transform:scale(0.97); opacity:0.9; }
    .fan-btn-white { background:#fff; color:var(--pink-dark); }
    .fan-btn-outline { background:rgba(255,255,255,0.15); color:#fff; border:2px solid rgba(255,255,255,0.6); }
    .fan-btn-icon { font-size:18px; flex-shrink:0; }
    .fan-social { display:flex; gap:11px; width:100%; max-width:320px; }
    .fan-social-btn {
      flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
      padding:15px 12px; border-radius:50px;
      background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.6);
      color:#fff; font-family:"Rubik",sans-serif; font-size:14px; font-weight:500;
      text-decoration:none; transition:transform 0.15s,opacity 0.15s;
    }
    .fan-social-btn:active { transform:scale(0.97); opacity:0.9; }
    .social-icon { width:22px; height:22px; flex-shrink:0; }
    .fan-credit { margin-top:20px; font-size:11px; color:rgba(255,255,255,0.45); letter-spacing:0.3px; }
  </style>
</head>
